name: Keep-alive

# Evita o spin-down do serviço web no plano free do Render (inatividade >~15min)
# e a suspensão do compute do Neon (Postgres) por inatividade — /health toca na
# BD, por isso um único ping mantém ambos "quentes". GitHub Actions cron é
# best-effort (pode atrasar alguns minutos sob carga), daí o intervalo de 10min
# em vez dos ~15min de margem real do Render.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          status=$(curl -s -o /tmp/health.json -w "%{http_code}" https://invoice-scanner-server.onrender.com/health)
          cat /tmp/health.json
          echo "HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::warning::Health check returned $status"
          fi
