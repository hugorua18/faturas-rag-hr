# Free plan (no Render-managed database — Postgres is hosted on Neon instead,
# since Render's own free Postgres expires 30 days after creation). Prisma's
# datasource is still "sqlite" as of this commit — swapping the provider +
# running a fresh migration against the Neon database is a deliberate manual
# step to do right before the first real deploy, not automated here.
services:
  - type: web
    name: invoice-scanner-server
    runtime: docker
    dockerfilePath: ./apps/server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 4001
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_SIGNIN_CLIENT_ID
        sync: false
      - key: GOOGLE_SIGNIN_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SIGNIN_IOS_CLIENT_ID
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
